# =============================================================================
# ShuttlX — Release Pipeline
# =============================================================================
#
# Branch strategy:
#   - Push to main          → App Store distribution (auto patch version bump)
#   - Push to other branch  → TestFlight beta build (no version increment)
#   - Tag v*.*.*            → Production App Store release (version from tag)
#   - workflow_dispatch     → Manual (choose version type + destination)
#
# Build number: github.run_number + offset for monotonic uniqueness.
#
# Required GitHub Secrets:
#
#   APP_STORE_CONNECT_API_KEY_ID                   API Key ID
#   APP_STORE_CONNECT_ISSUER_ID                    Issuer ID (UUID)
#   APP_STORE_CONNECT_API_KEY_CONTENT              Base64-encoded .p8 key
#   KEYCHAIN_PASSWORD                              CI keychain password
#   BUILD_CERTIFICATE_BASE64                       Base64 .p12 distribution cert
#   P12_PASSWORD                                   .p12 password
#   APPLE_TEAM_ID                                  Team ID (83HPSY452Y)
#   IOS_PROVISIONING_PROFILE_BASE64                com.shuttlx.ShuttlX
#   WATCH_PROVISIONING_PROFILE_BASE64              com.shuttlx.ShuttlX.watchkitapp
#   LIVEACTIVITY_PROVISIONING_PROFILE_BASE64       com.shuttlx.ShuttlX.ShuttlXLiveActivity
#   WIDGETS_PROVISIONING_PROFILE_BASE64            com.shuttlx.ShuttlX.ShuttlXWidgets
#   WATCH_WIDGETS_PROVISIONING_PROFILE_BASE64      com.shuttlx.ShuttlX.watchkitapp.ShuttlXWatchWidgets
#
# =============================================================================

name: Release Pipeline

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - '.github/workflows/test.yml'
      - '.claude/**'
      - 'agents/**'
      - 'docs/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
      release_type:
        description: 'Release destination'
        required: true
        default: 'testflight'
        type: choice
        options:
        - testflight
        - appstore

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 2. Select Xcode
      # ----------------------------------------------------------------
      - name: Select Xcode version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -switch "$XCODE_PATH"
          xcodebuild -version
          xcodebuild -showsdks | grep -E "iOS|watchOS" | head -5

      # ----------------------------------------------------------------
      # 3. Resolve SPM packages
      # ----------------------------------------------------------------
      - name: Resolve Swift packages
        run: |
          xcodebuild -project ShuttlX.xcodeproj \
            -scheme ShuttlX \
            -resolvePackageDependencies

      # ----------------------------------------------------------------
      # 4. Set release parameters
      # ----------------------------------------------------------------
      - name: Set release parameters
        id: trigger
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${{ github.ref }}"
            TAG_VERSION="${TAG_VERSION#refs/tags/v}"
            echo "type=tag" >> $GITHUB_OUTPUT
            echo "version_type=tag" >> $GITHUB_OUTPUT
            echo "release_type=appstore" >> $GITHUB_OUTPUT
            echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
            echo "Production release triggered by tag: v$TAG_VERSION"

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=manual" >> $GITHUB_OUTPUT
            echo "version_type=${{ github.event.inputs.version_type }}" >> $GITHUB_OUTPUT
            echo "release_type=${{ github.event.inputs.release_type }}" >> $GITHUB_OUTPUT
            echo "tag_version=" >> $GITHUB_OUTPUT
            echo "Manual release: ${{ github.event.inputs.version_type }} → ${{ github.event.inputs.release_type }}"

          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "type=automatic" >> $GITHUB_OUTPUT
            echo "version_type=patch" >> $GITHUB_OUTPUT
            echo "release_type=appstore" >> $GITHUB_OUTPUT
            echo "tag_version=" >> $GITHUB_OUTPUT
            echo "App Store release triggered by push to main"

          else
            BRANCH_NAME="${{ github.ref_name }}"
            echo "type=branch" >> $GITHUB_OUTPUT
            echo "version_type=none" >> $GITHUB_OUTPUT
            echo "release_type=testflight" >> $GITHUB_OUTPUT
            echo "tag_version=" >> $GITHUB_OUTPUT
            echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
            echo "TestFlight beta build from branch: $BRANCH_NAME"
          fi

      # ----------------------------------------------------------------
      # 5. Calculate version
      # ----------------------------------------------------------------
      - name: Calculate version
        id: new_version
        run: |
          TRIGGER_TYPE="${{ steps.trigger.outputs.type }}"
          VERSION_TYPE="${{ steps.trigger.outputs.version_type }}"
          TAG_TRIGGER_VERSION="${{ steps.trigger.outputs.tag_version }}"

          # Get latest version from git tags
          LATEST_TAG_VERSION=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null | sed 's/^v//' || echo "1.0.0")
          echo "Latest tag version: $LATEST_TAG_VERSION"

          if [ "$TRIGGER_TYPE" = "branch" ]; then
            NEW_VERSION="$LATEST_TAG_VERSION"
            echo "Branch build: using current version $NEW_VERSION"

          elif [ "$TRIGGER_TYPE" = "tag" ]; then
            NEW_VERSION="$TAG_TRIGGER_VERSION"
            echo "Tag release: using version $NEW_VERSION"

          else
            # Auto-increment
            IFS='.' read -ra V <<< "$LATEST_TAG_VERSION"
            MAJOR=${V[0]:-1}; MINOR=${V[1]:-0}; PATCH=${V[2]:-0}

            case $VERSION_TYPE in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            echo "Auto-incremented: $LATEST_TAG_VERSION → $NEW_VERSION ($VERSION_TYPE)"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # 6. Calculate build number
      # ----------------------------------------------------------------
      - name: Calculate build number
        id: build_number
        run: |
          # Offset ensures continuity from previous sequential build numbers
          OFFSET=33
          BUILD_NUMBER=$(( ${{ github.run_number }} + OFFSET ))
          echo "number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build number: $BUILD_NUMBER"

      # ----------------------------------------------------------------
      # 7. Generate release notes from git commits
      # ----------------------------------------------------------------
      - name: Generate release notes
        id: release_notes
        run: |
          TRIGGER_TYPE="${{ steps.trigger.outputs.type }}"

          # Find the last version tag to diff against
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "Generating notes since $LAST_TAG..."
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s" --no-merges 2>/dev/null || echo "")
          else
            echo "No previous tag, using last 20 commits..."
            COMMITS=$(git log -20 --pretty=format:"%s" --no-merges 2>/dev/null || echo "")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="Maintenance update"
          fi

          # Export commits for python
          export COMMITS

          # Parse conventional commits into user-friendly "What's New" text
          python3 << 'PYEOF'
          import os, re

          commits = os.environ.get("COMMITS", "").strip().split("\n")
          commits = [c.strip() for c in commits if c.strip()]

          features = []
          fixes = []
          other = []

          for msg in commits:
              # Skip CI/release commits
              if "[skip ci]" in msg or msg.startswith("chore(release)"):
                  continue

              # Strip conventional commit prefix
              clean = re.sub(r'^(feat|fix|perf|refactor|style|docs|test|ci|chore|build)(\(.*?\))?[!]?:\s*', '', msg)
              clean = clean.strip()
              if not clean:
                  continue
              # Capitalize first letter
              clean = clean[0].upper() + clean[1:]

              if msg.startswith("feat"):
                  features.append(clean)
              elif msg.startswith("fix"):
                  fixes.append(clean)
              elif msg.startswith(("perf", "refactor")):
                  other.append(clean)
              else:
                  other.append(clean)

          # Build "What's New" for App Store (max 4000 chars)
          lines = []
          for f in features[:8]:
              lines.append(f"- {f}")
          for f in fixes[:5]:
              lines.append(f"- {f}")
          for f in other[:3]:
              lines.append(f"- {f}")

          if not lines:
              lines = ["- Performance improvements and bug fixes"]

          whats_new = "\n".join(lines)

          # Build detailed notes for GitHub Release
          sections = []
          if features:
              sections.append("### New Features\n" + "\n".join(f"- {f}" for f in features))
          if fixes:
              sections.append("### Bug Fixes\n" + "\n".join(f"- {f}" for f in fixes))
          if other:
              sections.append("### Improvements\n" + "\n".join(f"- {f}" for f in other))

          detailed = "\n\n".join(sections) if sections else "- Maintenance update"

          # Write to files for later steps
          with open("whats_new.txt", "w") as f:
              f.write(whats_new)
          with open("release_notes.md", "w") as f:
              f.write(detailed)

          print("=== What's New (App Store) ===")
          print(whats_new)
          print("\n=== Detailed (GitHub Release) ===")
          print(detailed)
          PYEOF

          # Also write to fastlane metadata if directory exists
          mkdir -p fastlane/metadata/en-US
          cp whats_new.txt fastlane/metadata/en-US/release_notes.txt

          # Set multiline output
          {
            echo "whats_new<<ENDOFNOTES"
            cat whats_new.txt
            echo "ENDOFNOTES"
          } >> $GITHUB_OUTPUT

          {
            echo "detailed<<ENDOFDETAILED"
            cat release_notes.md
            echo "ENDOFDETAILED"
          } >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # 7b. Update project version
      # ----------------------------------------------------------------
      - name: Update project version
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          BUILD_NUMBER="${{ steps.build_number.outputs.number }}"

          echo "Setting version to $NEW_VERSION (build $BUILD_NUMBER)"

          # Update project.pbxproj
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $NEW_VERSION;/g" ShuttlX.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" ShuttlX.xcodeproj/project.pbxproj

          # agvtool as backup
          agvtool new-marketing-version "$NEW_VERSION" || true
          agvtool new-version -all "$BUILD_NUMBER" || true

          echo "Version: $(agvtool what-marketing-version -terse1 2>/dev/null || echo $NEW_VERSION)"
          echo "Build: $(agvtool what-version -terse 2>/dev/null || echo $BUILD_NUMBER)"

      # ----------------------------------------------------------------
      # 8. Import code signing certificate
      # ----------------------------------------------------------------
      - name: Import code signing certificate
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      # ----------------------------------------------------------------
      # 9. Install provisioning profiles
      # ----------------------------------------------------------------
      - name: Install provisioning profiles
        id: install_profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          install_profile() {
            local profile_base64=$1
            local profile_label=$2
            if [ -z "$profile_base64" ]; then
              echo "  Skipping $profile_label (secret not set)" >&2
              echo "|"
              return
            fi
            echo "$profile_base64" | base64 --decode > "temp_${profile_label}.mobileprovision"
            UUID=$(security cms -D -i "temp_${profile_label}.mobileprovision" | grep -A1 '<key>UUID</key>' | grep '<string>' | sed 's/<[^>]*>//g' | tr -d '[:space:]')
            PROFILE_NAME=$(security cms -D -i "temp_${profile_label}.mobileprovision" | grep -A1 '<key>Name</key>' | grep '<string>' | sed 's/<[^>]*>//g' | xargs)
            mv "temp_${profile_label}.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
            echo "  Installed $profile_label: $PROFILE_NAME ($UUID)" >&2
            echo "$UUID|$PROFILE_NAME"
          }

          IOS_INFO=$(install_profile "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" "iOS")
          WATCH_INFO=$(install_profile "${{ secrets.WATCH_PROVISIONING_PROFILE_BASE64 }}" "Watch")
          LIVEACTIVITY_INFO=$(install_profile "${{ secrets.LIVEACTIVITY_PROVISIONING_PROFILE_BASE64 }}" "LiveActivity")
          WIDGETS_INFO=$(install_profile "${{ secrets.WIDGETS_PROVISIONING_PROFILE_BASE64 }}" "Widgets")
          WATCH_WIDGETS_INFO=$(install_profile "${{ secrets.WATCH_WIDGETS_PROVISIONING_PROFILE_BASE64 }}" "WatchWidgets")

          echo "ios_name=$(echo "$IOS_INFO" | cut -d'|' -f2)" >> $GITHUB_OUTPUT
          echo "watch_name=$(echo "$WATCH_INFO" | cut -d'|' -f2)" >> $GITHUB_OUTPUT
          echo "liveactivity_name=$(echo "$LIVEACTIVITY_INFO" | cut -d'|' -f2)" >> $GITHUB_OUTPUT
          echo "widgets_name=$(echo "$WIDGETS_INFO" | cut -d'|' -f2)" >> $GITHUB_OUTPUT
          echo "watch_widgets_name=$(echo "$WATCH_WIDGETS_INFO" | cut -d'|' -f2)" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # 10. Create ExportOptions.plist
      # ----------------------------------------------------------------
      - name: Create ExportOptions.plist
        run: |
          RELEASE_TYPE="${{ steps.trigger.outputs.release_type }}"
          IOS_NAME="${{ steps.install_profiles.outputs.ios_name }}"
          WATCH_NAME="${{ steps.install_profiles.outputs.watch_name }}"
          LIVEACTIVITY_NAME="${{ steps.install_profiles.outputs.liveactivity_name }}"
          WIDGETS_NAME="${{ steps.install_profiles.outputs.widgets_name }}"
          WATCH_WIDGETS_NAME="${{ steps.install_profiles.outputs.watch_widgets_name }}"

          if [ "$RELEASE_TYPE" = "appstore" ]; then
            METHOD="app-store"
          else
            METHOD="app-store-connect"
          fi

          # Build optional profile entries
          EXTRA_PROFILES=""
          [ -n "$LIVEACTIVITY_NAME" ] && EXTRA_PROFILES="$EXTRA_PROFILES
                  <key>com.shuttlx.ShuttlX.ShuttlXLiveActivity</key>
                  <string>$LIVEACTIVITY_NAME</string>"
          [ -n "$WIDGETS_NAME" ] && EXTRA_PROFILES="$EXTRA_PROFILES
                  <key>com.shuttlx.ShuttlX.ShuttlXWidgets</key>
                  <string>$WIDGETS_NAME</string>"
          [ -n "$WATCH_WIDGETS_NAME" ] && EXTRA_PROFILES="$EXTRA_PROFILES
                  <key>com.shuttlx.ShuttlX.watchkitapp.ShuttlXWatchWidgets</key>
                  <string>$WATCH_WIDGETS_NAME</string>"

          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>$METHOD</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.shuttlx.ShuttlX</key>
                  <string>$IOS_NAME</string>
                  <key>com.shuttlx.ShuttlX.watchkitapp</key>
                  <string>$WATCH_NAME</string>
          $EXTRA_PROFILES
              </dict>
          </dict>
          </plist>
          EOF

          echo "ExportOptions created ($METHOD)"
          echo "  iOS: $IOS_NAME"
          echo "  Watch: $WATCH_NAME"
          echo "  LiveActivity: ${LIVEACTIVITY_NAME:-skipped}"
          echo "  Widgets: ${WIDGETS_NAME:-skipped}"
          echo "  WatchWidgets: ${WATCH_WIDGETS_NAME:-skipped}"

      # ----------------------------------------------------------------
      # 11. Configure manual signing
      # ----------------------------------------------------------------
      - name: Configure manual signing
        env:
          IOS_PROFILE: ${{ steps.install_profiles.outputs.ios_name }}
          WATCH_PROFILE: ${{ steps.install_profiles.outputs.watch_name }}
          LIVEACTIVITY_PROFILE: ${{ steps.install_profiles.outputs.liveactivity_name }}
          WIDGETS_PROFILE: ${{ steps.install_profiles.outputs.widgets_name }}
          WATCH_WIDGETS_PROFILE: ${{ steps.install_profiles.outputs.watch_widgets_name }}
        run: |
          python3 << 'PYEOF'
          import os

          ios = os.environ['IOS_PROFILE']
          watch = os.environ['WATCH_PROFILE']
          la = os.environ.get('LIVEACTIVITY_PROFILE', '')
          wg = os.environ.get('WIDGETS_PROFILE', '')
          ww = os.environ.get('WATCH_WIDGETS_PROFILE', '')

          pbx = 'ShuttlX.xcodeproj/project.pbxproj'
          with open(pbx, 'r') as f:
              content = f.read()

          content = content.replace('CODE_SIGN_STYLE = Automatic', 'CODE_SIGN_STYLE = Manual')

          content = content.replace(
              'CODE_SIGN_ENTITLEMENTS = ShuttlX/ShuttlX.entitlements;',
              'CODE_SIGN_ENTITLEMENTS = ShuttlX/ShuttlX.entitlements;\n'
              '\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "' + ios + '";')

          content = content.replace(
              'CODE_SIGN_ENTITLEMENTS = "ShuttlX Watch App/ShuttlX Watch App.entitlements";',
              'CODE_SIGN_ENTITLEMENTS = "ShuttlX Watch App/ShuttlX Watch App.entitlements";\n'
              '\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "' + watch + '";')

          if la:
              content = content.replace(
                  'PRODUCT_BUNDLE_IDENTIFIER = com.shuttlx.ShuttlX.ShuttlXLiveActivity;',
                  'PRODUCT_BUNDLE_IDENTIFIER = com.shuttlx.ShuttlX.ShuttlXLiveActivity;\n'
                  '\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "' + la + '";')

          if wg:
              content = content.replace(
                  'CODE_SIGN_ENTITLEMENTS = ShuttlXWidgets/ShuttlXWidgets.entitlements;',
                  'CODE_SIGN_ENTITLEMENTS = ShuttlXWidgets/ShuttlXWidgets.entitlements;\n'
                  '\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "' + wg + '";')

          if ww:
              content = content.replace(
                  'CODE_SIGN_ENTITLEMENTS = ShuttlXWatchWidgets/ShuttlXWatchWidgets.entitlements;',
                  'CODE_SIGN_ENTITLEMENTS = ShuttlXWatchWidgets/ShuttlXWatchWidgets.entitlements;\n'
                  '\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "' + ww + '";')

          with open(pbx, 'w') as f:
              f.write(content)

          print(f'Manual signing configured:')
          print(f'  iOS: {ios}')
          print(f'  Watch: {watch}')
          print(f'  LiveActivity: {la or "skipped"}')
          print(f'  Widgets: {wg or "skipped"}')
          print(f'  WatchWidgets: {ww or "skipped"}')
          PYEOF

      # ----------------------------------------------------------------
      # 12. Setup App Store Connect API key
      # ----------------------------------------------------------------
      - name: Setup App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      # ----------------------------------------------------------------
      # 13. Build and archive
      # ----------------------------------------------------------------
      - name: Build and archive
        run: |
          API_KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

          xcodebuild \
            -project ShuttlX.xcodeproj \
            -scheme ShuttlX \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "./build/ShuttlX.xcarchive" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            archive

      # ----------------------------------------------------------------
      # 14. Export archive
      # ----------------------------------------------------------------
      - name: Export archive
        run: |
          API_KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

          xcodebuild \
            -exportArchive \
            -archivePath "./build/ShuttlX.xcarchive" \
            -exportPath "./build/export" \
            -exportOptionsPlist "./ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

          if [ -f "./build/export/ShuttlX.ipa" ]; then
            echo "IPA created: $(ls -lh ./build/export/ShuttlX.ipa)"
          else
            echo "ERROR: IPA file not found!"
            exit 1
          fi

      # ----------------------------------------------------------------
      # 15. Upload to App Store Connect
      # ----------------------------------------------------------------
      - name: Upload to App Store Connect
        run: |
          RELEASE_TYPE="${{ steps.trigger.outputs.release_type }}"
          echo "Uploading to App Store Connect ($RELEASE_TYPE)..."

          xcrun altool \
            --upload-app \
            --type ios \
            --file "./build/export/ShuttlX.ipa" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose

          if [ "$RELEASE_TYPE" = "testflight" ]; then
            echo "Build will be available in TestFlight after processing"
          else
            echo "Build uploaded for App Store distribution"
          fi

      # ----------------------------------------------------------------
      # 16. Upload release notes to App Store Connect (App Store builds only)
      # ----------------------------------------------------------------
      - name: Upload release notes to App Store Connect
        if: steps.trigger.outputs.release_type == 'appstore'
        continue-on-error: true
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          # Write auto-generated notes to fastlane metadata
          mkdir -p fastlane/metadata/en-US
          cat whats_new.txt > fastlane/metadata/en-US/release_notes.txt

          # Install fastlane and push release notes
          gem install fastlane --no-document 2>/dev/null

          fastlane set_release_notes \
            version:"$NEW_VERSION" \
            notes:"$(cat whats_new.txt)" || {
              echo "Warning: Could not push release notes via fastlane"
              echo "Notes will need to be set manually in App Store Connect"
            }
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # ----------------------------------------------------------------
      # 17. Commit version changes (main + manual only)
      # ----------------------------------------------------------------
      - name: Commit version changes
        if: steps.trigger.outputs.type == 'automatic' || steps.trigger.outputs.type == 'manual'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          BUILD_NUMBER="${{ steps.build_number.outputs.number }}"

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          rm -f certificate.p12 ExportOptions.plist *.mobileprovision

          if ! git diff --quiet; then
            git add ShuttlX.xcodeproj/project.pbxproj || true
            git commit -m "chore(release): v$NEW_VERSION (build $BUILD_NUMBER) [skip ci]"
            git push origin main
            echo "Version changes committed"
          fi

      # ----------------------------------------------------------------
      # 17. Create git tag (main + manual only)
      # ----------------------------------------------------------------
      - name: Create git tag
        if: steps.trigger.outputs.type == 'automatic' || steps.trigger.outputs.type == 'manual'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          TAG_NAME="v$NEW_VERSION"

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists, skipping"
          else
            git tag -a "$TAG_NAME" -m "Release $NEW_VERSION"
            git push origin "$TAG_NAME"
            echo "Created tag: $TAG_NAME"
          fi

      # ----------------------------------------------------------------
      # 18. Create GitHub Release (not for branch builds)
      # ----------------------------------------------------------------
      - name: Create GitHub Release
        if: steps.trigger.outputs.type != 'branch'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: ShuttlX v${{ steps.new_version.outputs.version }}
          body: |
            ## ShuttlX v${{ steps.new_version.outputs.version }}

            **Build:** ${{ steps.build_number.outputs.number }}
            **Destination:** ${{ steps.trigger.outputs.release_type == 'testflight' && 'TestFlight' || 'App Store' }}

            ${{ steps.release_notes.outputs.detailed }}

            ---
            **What's New (App Store):**
            ${{ steps.release_notes.outputs.whats_new }}
          draft: false
          prerelease: ${{ steps.trigger.outputs.release_type == 'testflight' }}

      # ----------------------------------------------------------------
      # 19. Upload build artifacts
      # ----------------------------------------------------------------
      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ShuttlX-v${{ steps.new_version.outputs.version }}-Build-${{ steps.build_number.outputs.number }}
          path: build/export/ShuttlX.ipa
          retention-days: 30

      # ----------------------------------------------------------------
      # 20. Cleanup
      # ----------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          rm -f certificate.p12 ExportOptions.plist *.mobileprovision
          rm -rf ~/.appstoreconnect
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      # ----------------------------------------------------------------
      # 21. Summary
      # ----------------------------------------------------------------
      - name: Summary
        if: success()
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          BUILD_NUMBER="${{ steps.build_number.outputs.number }}"
          RELEASE_TYPE="${{ steps.trigger.outputs.release_type }}"
          TRIGGER_TYPE="${{ steps.trigger.outputs.type }}"

          echo ""
          echo "ShuttlX Release Complete"
          echo "========================"
          echo "  Version:     $NEW_VERSION"
          echo "  Build:       $BUILD_NUMBER"
          echo "  Destination: $RELEASE_TYPE"
          echo "  Trigger:     $TRIGGER_TYPE"
          echo "  Branch:      ${{ github.ref_name }}"
          echo ""
          if [ "$RELEASE_TYPE" = "appstore" ]; then
            echo "  -> App Store distribution build uploaded"
            echo "  -> Submit for review in App Store Connect"
          else
            echo "  -> TestFlight build uploaded"
            echo "  -> Available after processing (~5-10 min)"
          fi
