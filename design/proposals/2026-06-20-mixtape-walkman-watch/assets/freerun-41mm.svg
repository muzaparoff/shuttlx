<svg xmlns="http://www.w3.org/2000/svg" width="352" height="430" viewBox="0 0 352 430" font-family="'SF Mono','Menlo',monospace">
  <defs>
    <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2E36"/>
      <stop offset="1" stop-color="#15171C"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#FFB02E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFB02E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="reelMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6B7686"/>
      <stop offset="1" stop-color="#2E3742"/>
    </linearGradient>
    <clipPath id="screen"><rect x="0" y="0" width="352" height="430" rx="74"/></clipPath>
  </defs>

  <!-- watch OLED black -->
  <rect width="352" height="430" rx="74" fill="#000"/>
  <g clip-path="url(#screen)">
    <!-- matte deck body -->
    <rect x="10" y="20" width="332" height="396" rx="22" fill="url(#deck)"/>
    <rect x="10" y="20" width="332" height="396" rx="22" fill="none" stroke="#1C8009" stroke-opacity="0.25" stroke-width="1"/>

    <!-- ===== HEADER BAND ===== -->
    <!-- twin reels + tape -->
    <g transform="translate(34,52)">
      <line x1="14" y1="14" x2="58" y2="14" stroke="#1C8009" stroke-width="2"/>
      <g>
        <circle cx="14" cy="14" r="14" fill="url(#reelMetal)" stroke="#0c0f13" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="4.5" fill="#15171C"/>
        <g stroke="#9AA6B4" stroke-width="1.4">
          <line x1="14" y1="3" x2="14" y2="25"/><line x1="3" y1="14" x2="25" y2="14"/>
          <line x1="6.2" y1="6.2" x2="21.8" y2="21.8"/><line x1="21.8" y1="6.2" x2="6.2" y2="21.8"/>
        </g>
      </g>
      <g>
        <circle cx="58" cy="14" r="14" fill="url(#reelMetal)" stroke="#0c0f13" stroke-width="1.5"/>
        <circle cx="58" cy="14" r="4.5" fill="#15171C"/>
        <g stroke="#9AA6B4" stroke-width="1.4" transform="rotate(22 58 14)">
          <line x1="58" y1="3" x2="58" y2="25"/><line x1="47" y1="14" x2="69" y2="14"/>
          <line x1="50.2" y1="6.2" x2="65.8" y2="21.8"/><line x1="65.8" y1="6.2" x2="50.2" y2="21.8"/>
        </g>
      </g>
    </g>
    <!-- SIDE A tag -->
    <rect x="200" y="56" width="60" height="22" rx="11" fill="#FFB02E" fill-opacity="0.88" stroke="#1C2330" stroke-opacity="0.4"/>
    <text x="230" y="71" text-anchor="middle" font-size="13" font-weight="800" fill="#1C2330" letter-spacing="1">SIDE A</text>
    <!-- transport glyph: PLAY (running) -->
    <path d="M288 56 L308 66 L288 76 Z" fill="#39FF14"/>

    <!-- ===== LCD WELL ===== -->
    <rect x="24" y="92" width="304" height="296" rx="16" fill="#051405" stroke="#1C8009" stroke-opacity="0.55" stroke-width="1.5"/>

    <!-- sublabel -->
    <text x="44" y="124" font-size="15" font-weight="800" fill="#8CADCC" letter-spacing="2">ELAPSED</text>
    <circle cx="300" cy="118" r="8" fill="none" stroke="#1C8009" stroke-width="1.6"/>
    <circle cx="300" cy="118" r="2.4" fill="#1C8009"/>

    <!-- HERO -->
    <ellipse cx="176" cy="178" rx="120" ry="40" fill="url(#amberGlow)"/>
    <text x="176" y="196" text-anchor="middle" font-size="84" font-weight="700" fill="#39FF14" letter-spacing="2" font-variant-numeric="tabular-nums">20:12</text>

    <!-- VU METER (full width, x in [44,236]) -->
    <g transform="translate(44,232)">
      <!-- 12 segments: 6 lit green (Z2), rest dim. seg w=11, pitch 14 → ends at x=165 (abs 209) -->
      <rect x="0"   width="11" height="16" rx="3" fill="#39FF14"/>
      <rect x="14"  width="11" height="16" rx="3" fill="#39FF14"/>
      <rect x="28"  width="11" height="16" rx="3" fill="#39FF14"/>
      <rect x="42"  width="11" height="16" rx="3" fill="#39FF14"/>
      <rect x="56"  width="11" height="16" rx="3" fill="#39FF14"/>
      <rect x="70"  width="11" height="16" rx="3" fill="#39FF14"/>
      <rect x="84"  width="11" height="16" rx="3" fill="#1C8009" fill-opacity="0.25"/>
      <rect x="98"  width="11" height="16" rx="3" fill="#1C8009" fill-opacity="0.25"/>
      <rect x="112" width="11" height="16" rx="3" fill="#1C8009" fill-opacity="0.25"/>
      <rect x="126" width="11" height="16" rx="3" fill="#1C8009" fill-opacity="0.25"/>
      <rect x="140" width="11" height="16" rx="3" fill="#1C8009" fill-opacity="0.25"/>
      <rect x="154" width="11" height="16" rx="3" fill="#1C8009" fill-opacity="0.25"/>
    </g>

    <!-- HR cluster, right-aligned. "142" digits end at x=320; nothing crosses x=328. -->
    <text x="318" y="252" text-anchor="end" font-size="52" font-weight="700" fill="#3DDC84" font-variant-numeric="tabular-nums">142</text>

    <!-- label row: HR (far left) ... BPM + Z2 (right cluster ≤328) -->
    <text x="44" y="286" font-size="14" font-weight="700" fill="#8CADCC" letter-spacing="1">HR</text>
    <text x="250" y="286" text-anchor="end" font-size="14" font-weight="700" fill="#8CADCC">BPM</text>
    <rect x="294" y="272" width="32" height="20" rx="4" fill="none" stroke="#3DDC84" stroke-opacity="0.5"/>
    <text x="310" y="287" text-anchor="middle" font-size="14" font-weight="700" fill="#3DDC84">Z2</text>

    <!-- DIST / PACE two-up -->
    <g transform="translate(44,316)">
      <text x="0"   y="20" font-size="15" font-weight="700" fill="#8CADCC" letter-spacing="1">DIST</text>
      <text x="56"  y="22" font-size="26" font-weight="700" fill="#39FF14" font-variant-numeric="tabular-nums">1.92</text>
      <text x="118" y="20" font-size="13" font-weight="700" fill="#8CADCC">km</text>
    </g>
    <g transform="translate(44,352)">
      <text x="0"   y="20" font-size="15" font-weight="700" fill="#8CADCC" letter-spacing="1">PACE</text>
      <text x="58"  y="22" font-size="26" font-weight="700" fill="#39FF14" font-variant-numeric="tabular-nums">10'10"</text>
    </g>
  </g>
</svg>
