  <rect x="128" y="428" width="5" height="13" rx="1" fill="#39FF14"/>
  <rect x="135" y="428" width="5" height="13" rx="1" fill="#39FF14"/>
  <rect x="142" y="428" width="5" height="13" rx="1" fill="#39FF14"/>
  <rect x="149" y="428" width="5" height="13" rx="1" fill="#39FF14"/>
  <rect x="156" y="428" width="5" height="13" rx="1" fill="#F2A61A"/>
  <rect x="163" y="428" width="5" height="13" rx="1" fill="#FF333340"/>
