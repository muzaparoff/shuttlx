  <text x="234" y="547" font-family="monospace" font-size="9" fill="#C0392B" text-anchor="middle" font-weight="bold">PAUSE</text>
  <text x="234" y="558" font-family="monospace" font-size="6.5" fill="#C0392B" text-anchor="middle" opacity="0.7">PLAY KEY</text>

