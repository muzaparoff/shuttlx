  <!-- Red binding edge (signature felt-pad stripe) -->
  <rect x="22" y="78" width="5" height="128" rx="2.5" fill="#C0392B"/>

  <!-- Handwritten-style section header -->
  <text x="38" y="100" font-family="Georgia,serif" font-size="13" fill="#2C2416" font-weight="bold" font-style="italic">Mixtape #14 · 2026 spring run</text>
  <!-- SIDE A / REC indicator row -->
  <rect x="38" y="108" width="44" height="18" rx="2" fill="none" stroke="#2C2416" stroke-width="1.5"/>
  <text x="60" y="121" font-family="monospace" font-size="9" fill="#2C2416" font-weight="bold" text-anchor="middle">SIDE A</text>
