  <text x="46" y="180" font-family="monospace" font-size="10" fill="white" font-weight="bold">02.</text>
  <text x="70" y="180" font-family="Georgia,serif" font-size="12" fill="white" font-weight="bold">RUN</text>
  <text x="355" y="180" font-family="monospace" font-size="10" fill="white" font-weight="bold" text-anchor="end">1:30</text>
  <rect x="30" y="190" width="333" height="0.5" fill="#C8BDA8" opacity="0.6"/>

