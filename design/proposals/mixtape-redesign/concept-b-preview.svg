  <text x="350" y="434" font-family="monospace" font-size="20" fill="#39FF14" font-weight="bold" text-anchor="end" filter="url(#glowGreen)">5'42"</text>
  <text x="356" y="426" font-family="monospace" font-size="8" fill="#8CADCC">/km</text>
  <text x="196" y="445" font-family="monospace" font-size="8" fill="#1B6606" text-anchor="middle" letter-spacing="1.5">ELAPSED · STEP 2/8</text>

