  <text x="38" y="210" font-family="monospace" font-size="10" fill="#5A4E3E">03.</text>
  <text x="62" y="210" font-family="Georgia,serif" font-size="11" fill="#5A4E3E">WALK</text>
  <text x="355" y="210" font-family="monospace" font-size="10" fill="#5A4E3E" text-anchor="end">0:45</text>
  <rect x="30" y="214" width="333" height="0.5" fill="#C8BDA8" opacity="0.6"/>

  <!-- Track 4 -->
  <text x="38" y="234" font-family="monospace" font-size="10" fill="#5A4E3E">04.</text>
  <text x="62" y="234" font-family="Georgia,serif" font-size="11" fill="#5A4E3E">RUN</text>
  <text x="355" y="234" font-family="monospace" font-size="10" fill="#5A4E3E" text-anchor="end">1:30</text>
  <rect x="30" y="238" width="333" height="0.5" fill="#C8BDA8" opacity="0.6"/>

