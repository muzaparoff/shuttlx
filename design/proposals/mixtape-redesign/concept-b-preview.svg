  <text x="339" y="548" font-family="monospace" font-size="7" fill="#8B7D65" text-anchor="middle">STOP</text>

  <!-- ═══ CORNER CREASE MARKS (authentic J-card wear) ═══ -->
  <line x1="10" y1="22" x2="22" y2="10" stroke="#C8BDA8" stroke-width="1.5" opacity="0.7"/>
  <line x1="371" y1="10" x2="383" y2="22" stroke="#C8BDA8" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="830" x2="22" y2="842" stroke="#C8BDA8" stroke-width="1.5" opacity="0.7"/>
  <line x1="383" y1="830" x2="371" y2="842" stroke="#C8BDA8" stroke-width="1.5" opacity="0.7"/>

  <!-- Home indicator -->
  <rect x="147" y="826" width="99" height="5" rx="2.5" fill="#2C2416" opacity="0.2"/>

  <!-- ═══ CONCEPT LABEL ═══ -->
  <rect x="22" y="580" width="349" height="36" rx="8" fill="#2C2416" opacity="0.08"/>
  <text x="197" y="594" font-family="-apple-system,system-ui,sans-serif" font-size="11" fill="#2C2416" text-anchor="middle" font-weight="700">CONCEPT B — J-Card Travel Wallet</text>
  <text x="197" y="609" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#5A4E3E" text-anchor="middle">Real paper texture · tracklist layout · die-cut LCD window</text>
