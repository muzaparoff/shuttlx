  <text x="62" y="154" font-family="Georgia,serif" font-size="11" fill="#8B7D65">WARM UP</text>
  <text x="355" y="154" font-family="monospace" font-size="10" fill="#8B7D65" text-anchor="end">5:00 ✓</text>
