<svg width="393" height="852" viewBox="0 0 393 852" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="ruledLines" x="0" y="0" width="1" height="14" patternUnits="userSpaceOnUse">
      <line x1="0" y1="13" x2="393" y2="13" stroke="#C8BDA8" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="paperGrain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#8B7D65" opacity="0.06"/>
      <circle cx="2.5" cy="2.2" r="0.3" fill="#8B7D65" opacity="0.04"/>
    </pattern>
    <linearGradient id="paperBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="40%" stop-color="#F0EBE0"/>
      <stop offset="100%" stop-color="#EAE4D8"/>
    </linearGradient>
    <linearGradient id="redMarker" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C0392B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lcdWindow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010D01"/>
      <stop offset="100%" stop-color="#000A00"/>
    </linearGradient>
    <linearGradient id="paperTopShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00000018"/>
      <stop offset="100%" stop-color="#00000000"/>
    </linearGradient>
  </defs>

  <!-- ═══ PHONE FRAME ═══ -->
  <rect x="0" y="0" width="393" height="852" rx="48" ry="48" fill="#2A1C10"/>
  <!-- Cream paper background fills the screen -->
  <rect x="3" y="3" width="387" height="846" rx="45" ry="45" fill="url(#paperBg)"/>
  <!-- Ruled lines overlay -->
  <rect x="3" y="3" width="387" height="846" rx="45" ry="45" fill="url(#ruledLines)"/>
  <!-- Paper grain texture -->
  <rect x="3" y="3" width="387" height="846" rx="45" ry="45" fill="url(#paperGrain)"/>
  <!-- Faint top vignette (worn paper top) -->
  <rect x="3" y="3" width="387" height="120" rx="45" fill="url(#paperTopShadow)"/>

  <!-- ═══ STATUS BAR ═══ -->
  <text x="32" y="52" font-family="-apple-system,SF Pro Display,sans-serif" font-size="17" fill="#2C2416" font-weight="600">9:41</text>
