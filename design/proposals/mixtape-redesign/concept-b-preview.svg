  <text x="38" y="258" font-family="monospace" font-size="10" fill="#5A4E3E">05.</text>
  <text x="62" y="258" font-family="Georgia,serif" font-size="11" fill="#5A4E3E">WALK</text>
  <text x="355" y="258" font-family="monospace" font-size="10" fill="#5A4E3E" text-anchor="end">0:45</text>
  <rect x="30" y="262" width="333" height="0.5" fill="#C8BDA8" opacity="0.6"/>

