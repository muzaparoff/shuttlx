<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="neonBtnGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark surface -->
  <rect x="4" y="4" width="72" height="72" rx="12" fill="#141428"/>
  <!-- Neon cyan border -->
  <rect x="4" y="4" width="72" height="72" rx="12" fill="none" stroke="#00F5FF" stroke-width="2" filter="url(#neonBtnGlow)"/>
  <!-- Inner subtle glow -->
  <rect x="8" y="8" width="64" height="64" rx="10" fill="#00F5FF" fill-opacity="0.05"/>
  <!-- Play triangle -->
  <polygon points="32,24 32,56 56,40" fill="#00F5FF" filter="url(#neonBtnGlow)"/>
</svg>
