<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="58%" r="25%">
      <stop offset="0%" stop-color="#FF2D95" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FF2D95" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#00F5FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="45%" stop-color="#0A0A1A"/>
      <stop offset="55%" stop-color="#1a0a2e"/>
      <stop offset="65%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
  </defs>
  <!-- Dark sky -->
  <rect width="390" height="844" fill="url(#skyGrad)"/>
  <!-- Sun glow at horizon -->
  <rect width="390" height="844" fill="url(#sunGlow)"/>
  <!-- Horizon line -->
  <line x1="0" y1="490" x2="390" y2="490" stroke="#FF2D95" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Horizontal perspective grid lines (below horizon) -->
  <line x1="0" y1="510" x2="390" y2="510" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.12"/>
  <line x1="0" y1="535" x2="390" y2="535" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.10"/>
  <line x1="0" y1="565" x2="390" y2="565" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.08"/>
  <line x1="0" y1="600" x2="390" y2="600" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.07"/>
  <line x1="0" y1="642" x2="390" y2="642" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.06"/>
  <line x1="0" y1="692" x2="390" y2="692" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.05"/>
  <line x1="0" y1="752" x2="390" y2="752" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.04"/>
  <line x1="0" y1="820" x2="390" y2="820" stroke="#00F5FF" stroke-width="0.8" stroke-opacity="0.03"/>
  <!-- Vertical converging grid lines -->
  <line x1="195" y1="490" x2="195" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.08"/>
  <line x1="195" y1="490" x2="0" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.06"/>
  <line x1="195" y1="490" x2="390" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.06"/>
  <line x1="195" y1="490" x2="-100" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.04"/>
  <line x1="195" y1="490" x2="490" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.04"/>
  <line x1="195" y1="490" x2="65" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.05"/>
  <line x1="195" y1="490" x2="325" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.05"/>
  <line x1="195" y1="490" x2="130" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.06"/>
  <line x1="195" y1="490" x2="260" y2="844" stroke="#00F5FF" stroke-width="0.6" stroke-opacity="0.06"/>
