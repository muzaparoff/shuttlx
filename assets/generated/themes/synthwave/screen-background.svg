  <circle cx="50" cy="80" r="1" fill="white" fill-opacity="0.6"/>
  <circle cx="120" cy="150" r="0.8" fill="white" fill-opacity="0.4"/>
  <circle cx="300" cy="60" r="1.2" fill="white" fill-opacity="0.5"/>
  <circle cx="340" cy="200" r="0.7" fill="white" fill-opacity="0.3"/>
  <circle cx="200" cy="40" r="0.9" fill="white" fill-opacity="0.5"/>
  <circle cx="80" cy="300" r="0.6" fill="white" fill-opacity="0.3"/>
  <circle cx="350" cy="350" r="0.8" fill="white" fill-opacity="0.4"/>
  <circle cx="160" cy="250" r="1" fill="white" fill-opacity="0.3"/>
