<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="amberGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="trophyBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="50%" stop-color="#CC9400"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#0A0A1A" rx="16"/>
  <!-- Grid lines (subtle) -->
  <line x1="0" y1="180" x2="200" y2="180" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="0" y1="160" x2="200" y2="160" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="0" y1="140" x2="200" y2="140" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="40" y1="120" x2="40" y2="200" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="80" y1="120" x2="80" y2="200" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="120" y1="120" x2="120" y2="200" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="160" y1="120" x2="160" y2="200" stroke="#00F5FF" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Trophy cup -->
  <path d="M 70 60 L 65 110 Q 65 130 100 135 Q 135 130 135 110 L 130 60 Z" fill="url(#trophyBody)" fill-opacity="0.9" filter="url(#amberGlow)"/>
  <!-- Trophy handles -->
  <path d="M 65 70 Q 40 70 40 90 Q 40 110 65 108" fill="none" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
  <path d="M 135 70 Q 160 70 160 90 Q 160 110 135 108" fill="none" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
  <!-- Trophy base -->
  <rect x="85" y="135" width="30" height="8" rx="2" fill="#CC9400"/>
  <rect x="75" y="143" width="50" height="6" rx="3" fill="#FFB800"/>
  <!-- Chrome highlight on cup -->
  <path d="M 80 65 L 78 95 Q 85 70 120 65" fill="white" fill-opacity="0.15"/>
  <!-- Star on trophy -->
  <polygon points="100,72 104,84 117,84 107,92 110,104 100,96 90,104 93,92 83,84 96,84" fill="#00F5FF" fill-opacity="0.9" filter="url(#cyanGlow)"/>
  <!-- Neon border frame -->
  <rect x="4" y="4" width="192" height="192" rx="14" fill="none" stroke="#00F5FF" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
