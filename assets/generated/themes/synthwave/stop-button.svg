<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="swStopGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark surface -->
  <rect x="4" y="4" width="72" height="72" rx="12" fill="#141428"/>
  <!-- Neon magenta border -->
  <rect x="4" y="4" width="72" height="72" rx="12" fill="none" stroke="#FF2D95" stroke-width="2.5" filter="url(#swStopGlow)"/>
  <!-- Inner glow -->
  <rect x="8" y="8" width="64" height="64" rx="10" fill="#FF2D95" fill-opacity="0.06"/>
  <!-- Stop square - neon magenta -->
  <rect x="26" y="26" width="28" height="28" rx="2" fill="#FF2D95" filter="url(#swStopGlow)"/>
</svg>
