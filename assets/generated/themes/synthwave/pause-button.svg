<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="swPauseGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark surface -->
  <circle cx="40" cy="40" r="36" fill="#141428"/>
  <!-- Neon amber border -->
  <circle cx="40" cy="40" r="34" fill="none" stroke="#FFB800" stroke-width="2.5" filter="url(#swPauseGlow)"/>
  <!-- Inner glow -->
  <circle cx="40" cy="40" r="30" fill="#FFB800" fill-opacity="0.06"/>
  <!-- Pause bars - neon amber -->
  <rect x="29" y="25" width="6" height="30" rx="1" fill="#FFB800" filter="url(#swPauseGlow)"/>
  <rect x="45" y="25" width="6" height="30" rx="1" fill="#FFB800" filter="url(#swPauseGlow)"/>
</svg>
