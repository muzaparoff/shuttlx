<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="tapeWindow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1008"/>
      <stop offset="50%" stop-color="#2d1f0e"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="reelHub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d2e1a"/>
      <stop offset="60%" stop-color="#2a1f10"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </radialGradient>
    <linearGradient id="labelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8d4a8"/>
    </linearGradient>
    <filter id="plastic">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>
  </defs>

  <text x="200" y="24" text-anchor="middle" font-family="monospace" font-size="13" fill="#888" font-weight="bold">CLASSIC RADIO — watchOS</text>

  <!-- Watch bezel -->
  <rect x="50" y="42" width="300" height="390" rx="48" fill="#111"/>
  <rect x="52" y="44" width="296" height="386" rx="46" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Screen area -->
  <rect x="62" y="54" width="276" height="366" rx="38" fill="#1c1408"/>

  <!-- Cassette shell body -->
  <rect x="72" y="64" width="256" height="346" rx="16" fill="#3a2d1e" filter="url(#plastic)"/>
  <rect x="72" y="64" width="256" height="346" rx="16" fill="none" stroke="#5a4a32" stroke-width="1.5"/>

  <!-- Screw holes -->
  <circle cx="92" cy="84" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="308" cy="84" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="92" cy="390" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="308" cy="390" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>

  <!-- Label area (top) -->
  <rect x="88" y="92" width="224" height="108" rx="4" fill="url(#labelBg)"/>
  <rect x="88" y="92" width="224" height="108" rx="4" fill="none" stroke="#c4a878" stroke-width="0.5"/>
  <line x1="96" y1="112" x2="304" y2="112" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="96" y1="132" x2="304" y2="132" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="96" y1="152" x2="304" y2="152" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="96" y1="172" x2="304" y2="172" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="96" y1="192" x2="304" y2="192" stroke="#c4a878" stroke-width="0.3"/>

  <!-- Timer on label -->
  <text x="200" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" fill="#2a1f10" font-weight="bold">12:34</text>
  <!-- Metrics on label -->
  <text x="200" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#5a4a32">2.45 KM</text>
  <text x="200" y="172" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#cc4444">142 BPM</text>
  <text x="200" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#5a4a32">5:02 /KM</text>

  <!-- Level bars — fully inside cassette panel (below label) -->
  <g transform="translate(92, 208)">
    <text x="0" y="10" font-family="'Courier New', monospace" font-size="8" fill="#8a7a5a">L</text>
    <g transform="translate(14, 0)">
      <rect x="0" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.9"/>
      <rect x="10" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.9"/>
      <rect x="20" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.8"/>
      <rect x="30" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.7"/>
      <rect x="40" y="2" width="8" height="8" rx="1" fill="#e8a030" opacity="0.8"/>
      <rect x="50" y="2" width="8" height="8" rx="1" fill="#e8a030" opacity="0.7"/>
      <rect x="60" y="2" width="8" height="8" rx="1" fill="#e8a030" opacity="0.5"/>
      <rect x="70" y="2" width="8" height="8" rx="1" fill="#ff6633" opacity="0.4"/>
      <rect x="80" y="2" width="8" height="8" rx="1" fill="#cc4444" opacity="0.25"/>
      <rect x="90" y="2" width="8" height="8" rx="1" fill="#cc4444" opacity="0.12"/>
    </g>
  </g>
  <g transform="translate(92, 222)">
    <text x="0" y="10" font-family="'Courier New', monospace" font-size="8" fill="#8a7a5a">R</text>
    <g transform="translate(14, 0)">
      <rect x="0" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.9"/>
      <rect x="10" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.8"/>
      <rect x="20" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.7"/>
      <rect x="30" y="2" width="8" height="8" rx="1" fill="#39FF14" opacity="0.5"/>
      <rect x="40" y="2" width="8" height="8" rx="1" fill="#e8a030" opacity="0.4"/>
      <rect x="50" y="2" width="8" height="8" rx="1" fill="#e8a030" opacity="0.2"/>
      <rect x="60" y="2" width="8" height="8" rx="1" fill="#e8a030" opacity="0.1"/>
      <rect x="70" y="2" width="8" height="8" rx="1" fill="#ff6633" opacity="0.08"/>
      <rect x="80" y="2" width="8" height="8" rx="1" fill="#cc4444" opacity="0.08"/>
      <rect x="90" y="2" width="8" height="8" rx="1" fill="#cc4444" opacity="0.08"/>
    </g>
  </g>

  <!-- Tape window -->
  <rect x="110" y="242" width="180" height="75" rx="8" fill="url(#tapeWindow)"/>
  <rect x="110" y="242" width="180" height="75" rx="8" fill="none" stroke="#5a4a32" stroke-width="1.5"/>

  <!-- Left reel -->
  <circle cx="160" cy="280" r="26" fill="url(#reelHub)" stroke="#5a4a32" stroke-width="1"/>
  <circle cx="160" cy="280" r="16" fill="none" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="160" cy="280" r="7" fill="#1a1008" stroke="#4a3a22" stroke-width="1"/>
  <line x1="160" y1="264" x2="160" y2="254" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="176" y1="280" x2="186" y2="280" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="160" y1="296" x2="160" y2="306" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="144" y1="280" x2="134" y2="280" stroke="#4a3a22" stroke-width="0.5"/>

  <!-- Right reel -->
  <circle cx="240" cy="280" r="26" fill="url(#reelHub)" stroke="#5a4a32" stroke-width="1"/>
  <circle cx="240" cy="280" r="16" fill="none" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="240" cy="280" r="7" fill="#1a1008" stroke="#4a3a22" stroke-width="1"/>
  <line x1="240" y1="264" x2="240" y2="254" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="256" y1="280" x2="266" y2="280" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="240" y1="296" x2="240" y2="306" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="224" y1="280" x2="214" y2="280" stroke="#4a3a22" stroke-width="0.5"/>

  <!-- Bottom guide teeth -->
  <rect x="145" y="326" width="5" height="14" rx="1" fill="#5a4a32"/>
  <rect x="185" y="326" width="5" height="14" rx="1" fill="#5a4a32"/>
  <rect x="210" y="326" width="5" height="14" rx="1" fill="#5a4a32"/>
  <rect x="250" y="326" width="5" height="14" rx="1" fill="#5a4a32"/>
  <path d="M150 340 Q200 358 250 340" fill="none" stroke="#5a4a32" stroke-width="1"/>

  <!-- Control buttons — only Pause + Stop (no rewind/ff/record) -->
  <g transform="translate(140, 362)">
    <!-- Pause -->
    <rect x="0" y="0" width="48" height="28" rx="4" fill="#2a1f10" stroke="#e8a030" stroke-width="1.5"/>
    <rect x="16" y="6" width="5" height="16" rx="1" fill="#e8a030"/>
    <rect x="26" y="6" width="5" height="16" rx="1" fill="#e8a030"/>
  </g>
  <g transform="translate(212, 362)">
    <!-- Stop -->
    <rect x="0" y="0" width="48" height="28" rx="4" fill="#2a1f10" stroke="#cc4444" stroke-width="1.5"/>
    <rect x="16" y="6" width="16" height="16" rx="1" fill="#cc4444"/>
  </g>

  <text x="200" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Classic Radio — warm brown/amber/cream. Cassette body + label.</text>
  <text x="200" y="474" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Level bars on panel (not screen). Only pause+stop buttons.</text>
</svg>