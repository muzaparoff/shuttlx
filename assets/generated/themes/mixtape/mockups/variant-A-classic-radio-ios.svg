<svg xmlns="http://www.w3.org/2000/svg" width="400" height="780" viewBox="0 0 400 780">
  <defs>
    <linearGradient id="tapeWindowI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1008"/>
      <stop offset="50%" stop-color="#2d1f0e"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="reelHubI" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d2e1a"/>
      <stop offset="60%" stop-color="#2a1f10"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </radialGradient>
    <linearGradient id="labelBgI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8d4a8"/>
    </linearGradient>
    <filter id="plasticI">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>
  </defs>

  <text x="200" y="24" text-anchor="middle" font-family="monospace" font-size="13" fill="#888" font-weight="bold">CLASSIC RADIO — iOS</text>

  <!-- Phone frame -->
  <rect x="30" y="40" width="340" height="700" rx="40" fill="#111"/>
  <rect x="32" y="42" width="336" height="696" rx="38" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Dynamic island -->
  <rect x="150" y="50" width="100" height="28" rx="14" fill="#000"/>

  <!-- Screen area -->
  <rect x="40" y="50" width="320" height="680" rx="34" fill="#1c1408"/>

  <!-- Cassette shell body (full screen) -->
  <rect x="44" y="54" width="312" height="672" rx="30" fill="#3a2d1e" filter="url(#plasticI)"/>
  <rect x="44" y="54" width="312" height="672" rx="30" fill="none" stroke="#5a4a32" stroke-width="1.5"/>

  <!-- Screw holes -->
  <circle cx="68" cy="78" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="332" cy="78" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="68" cy="702" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="332" cy="702" r="5" fill="#2a1f10" stroke="#4a3a22" stroke-width="0.5"/>

  <!-- Large label area -->
  <rect x="60" y="98" width="280" height="220" rx="6" fill="url(#labelBgI)"/>
  <rect x="60" y="98" width="280" height="220" rx="6" fill="none" stroke="#c4a878" stroke-width="0.5"/>
  <!-- Lines -->
  <line x1="70" y1="128" x2="330" y2="128" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="70" y1="158" x2="330" y2="158" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="70" y1="188" x2="330" y2="188" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="70" y1="218" x2="330" y2="218" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="70" y1="248" x2="330" y2="248" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="70" y1="278" x2="330" y2="278" stroke="#c4a878" stroke-width="0.3"/>
  <line x1="70" y1="308" x2="330" y2="308" stroke="#c4a878" stroke-width="0.3"/>

  <!-- "SIDE A" header sticker -->
  <rect x="130" y="100" width="140" height="22" rx="3" fill="#fff8e8" stroke="#c4a878" stroke-width="0.5"/>
  <text x="200" y="116" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8a6a3a" font-weight="bold">SIDE A — WORKOUT</text>

  <!-- Timer -->
  <text x="200" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" fill="#2a1f10" font-weight="bold">12:34</text>

  <!-- Metrics on label -->
  <text x="80" y="210" font-family="'Courier New', monospace" font-size="14" fill="#8a6a3a">DISTANCE</text>
  <text x="320" y="210" text-anchor="end" font-family="'Courier New', monospace" font-size="20" fill="#2a1f10" font-weight="bold">2.45 KM</text>
  <line x1="160" y1="208" x2="255" y2="208" stroke="#c4a878" stroke-width="0.5" stroke-dasharray="2,3"/>

  <text x="80" y="240" font-family="'Courier New', monospace" font-size="14" fill="#8a6a3a">HEART RATE</text>
  <text x="320" y="240" text-anchor="end" font-family="'Courier New', monospace" font-size="20" fill="#cc4444" font-weight="bold">142 BPM</text>
  <line x1="180" y1="238" x2="255" y2="238" stroke="#c4a878" stroke-width="0.5" stroke-dasharray="2,3"/>

  <text x="80" y="270" font-family="'Courier New', monospace" font-size="14" fill="#8a6a3a">PACE</text>
  <text x="320" y="270" text-anchor="end" font-family="'Courier New', monospace" font-size="20" fill="#2a1f10" font-weight="bold">5:02 /KM</text>
  <line x1="120" y1="268" x2="255" y2="268" stroke="#c4a878" stroke-width="0.5" stroke-dasharray="2,3"/>

  <text x="80" y="300" font-family="'Courier New', monospace" font-size="14" fill="#8a6a3a">CALORIES</text>
  <text x="320" y="300" text-anchor="end" font-family="'Courier New', monospace" font-size="20" fill="#2a1f10" font-weight="bold">286 kcal</text>
  <line x1="160" y1="298" x2="255" y2="298" stroke="#c4a878" stroke-width="0.5" stroke-dasharray="2,3"/>

  <!-- Level bars — on cassette panel below label -->
  <g transform="translate(68, 330)">
    <text x="0" y="10" font-family="'Courier New', monospace" font-size="9" fill="#8a7a5a">L</text>
    <g transform="translate(16, 0)">
      <rect x="0" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.9"/>
      <rect x="14" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.9"/>
      <rect x="28" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.8"/>
      <rect x="42" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.7"/>
      <rect x="56" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.6"/>
      <rect x="70" y="2" width="12" height="10" rx="1" fill="#e8a030" opacity="0.8"/>
      <rect x="84" y="2" width="12" height="10" rx="1" fill="#e8a030" opacity="0.7"/>
      <rect x="98" y="2" width="12" height="10" rx="1" fill="#e8a030" opacity="0.5"/>
      <rect x="112" y="2" width="12" height="10" rx="1" fill="#ff6633" opacity="0.4"/>
      <rect x="126" y="2" width="12" height="10" rx="1" fill="#ff6633" opacity="0.25"/>
      <rect x="140" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.18"/>
      <rect x="154" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.1"/>
      <rect x="168" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="182" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="196" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="210" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="224" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
    </g>
  </g>
  <g transform="translate(68, 346)">
    <text x="0" y="10" font-family="'Courier New', monospace" font-size="9" fill="#8a7a5a">R</text>
    <g transform="translate(16, 0)">
      <rect x="0" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.9"/>
      <rect x="14" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.8"/>
      <rect x="28" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.7"/>
      <rect x="42" y="2" width="12" height="10" rx="1" fill="#39FF14" opacity="0.5"/>
      <rect x="56" y="2" width="12" height="10" rx="1" fill="#e8a030" opacity="0.5"/>
      <rect x="70" y="2" width="12" height="10" rx="1" fill="#e8a030" opacity="0.3"/>
      <rect x="84" y="2" width="12" height="10" rx="1" fill="#e8a030" opacity="0.15"/>
      <rect x="98" y="2" width="12" height="10" rx="1" fill="#ff6633" opacity="0.08"/>
      <rect x="112" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="126" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="140" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="154" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="168" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="182" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="196" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="210" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
      <rect x="224" y="2" width="12" height="10" rx="1" fill="#cc4444" opacity="0.06"/>
    </g>
  </g>

  <!-- Tape window (larger on iOS) -->
  <rect x="80" y="375" width="240" height="120" rx="10" fill="url(#tapeWindowI)"/>
  <rect x="80" y="375" width="240" height="120" rx="10" fill="none" stroke="#5a4a32" stroke-width="2"/>

  <!-- Left reel -->
  <circle cx="145" cy="435" r="42" fill="url(#reelHubI)" stroke="#5a4a32" stroke-width="1"/>
  <circle cx="145" cy="435" r="28" fill="none" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="145" cy="435" r="12" fill="#1a1008" stroke="#4a3a22" stroke-width="1"/>
  <line x1="145" y1="407" x2="145" y2="393" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="173" y1="435" x2="187" y2="435" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="145" y1="463" x2="145" y2="477" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="117" y1="435" x2="103" y2="435" stroke="#4a3a22" stroke-width="0.5"/>

  <!-- Right reel -->
  <circle cx="255" cy="435" r="42" fill="url(#reelHubI)" stroke="#5a4a32" stroke-width="1"/>
  <circle cx="255" cy="435" r="28" fill="none" stroke="#4a3a22" stroke-width="0.5"/>
  <circle cx="255" cy="435" r="12" fill="#1a1008" stroke="#4a3a22" stroke-width="1"/>
  <line x1="255" y1="407" x2="255" y2="393" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="283" y1="435" x2="297" y2="435" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="255" y1="463" x2="255" y2="477" stroke="#4a3a22" stroke-width="0.5"/>
  <line x1="227" y1="435" x2="213" y2="435" stroke="#4a3a22" stroke-width="0.5"/>

  <!-- Guide teeth -->
  <rect x="120" y="508" width="6" height="18" rx="1" fill="#5a4a32"/>
  <rect x="170" y="508" width="6" height="18" rx="1" fill="#5a4a32"/>
  <rect x="224" y="508" width="6" height="18" rx="1" fill="#5a4a32"/>
  <rect x="274" y="508" width="6" height="18" rx="1" fill="#5a4a32"/>
  <path d="M126 526 Q200 550 274 526" fill="none" stroke="#5a4a32" stroke-width="1"/>

  <!-- Controls — Pause + Stop only -->
  <g transform="translate(105, 560)">
    <rect x="0" y="0" width="80" height="40" rx="6" fill="#2a1f10" stroke="#e8a030" stroke-width="2"/>
    <rect x="28" y="8" width="8" height="24" rx="1" fill="#e8a030"/>
    <rect x="42" y="8" width="8" height="24" rx="1" fill="#e8a030"/>
    <text x="40" y="54" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8a7a5a">PAUSE</text>
  </g>
  <g transform="translate(215, 560)">
    <rect x="0" y="0" width="80" height="40" rx="6" fill="#2a1f10" stroke="#cc4444" stroke-width="2"/>
    <rect x="28" y="8" width="24" height="24" rx="2" fill="#cc4444"/>
    <text x="40" y="54" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8a7a5a">STOP</text>
  </g>

  <text x="200" y="750" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Classic Radio — iOS version. Larger label, wider level bars, bigger tape reels.</text>
</svg>