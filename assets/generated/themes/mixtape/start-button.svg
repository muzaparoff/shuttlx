<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <pattern id="btnDots" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.4" fill="#39FF14" fill-opacity="0.08"/>
    </pattern>
    <filter id="segGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Button body - sharp LCD panel -->
  <rect x="4" y="4" width="72" height="72" rx="6" fill="#0D0D0D" stroke="#333333" stroke-width="2"/>
  <!-- Inset border -->
  <rect x="8" y="8" width="64" height="64" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Dot matrix fill -->
  <rect x="4" y="4" width="72" height="72" rx="6" fill="url(#btnDots)"/>
  <!-- Green active border -->
  <rect x="4" y="4" width="72" height="72" rx="6" fill="none" stroke="#39FF14" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Play triangle - LCD segments -->
  <g filter="url(#segGlow)">
    <polygon points="30,24 30,56 54,40" fill="none" stroke="#39FF14" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
</svg>
