<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <pattern id="pDots" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.3" fill="#39FF14" fill-opacity="0.06"/>
    </pattern>
    <filter id="lcdPauseGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- LCD panel -->
  <rect x="4" y="4" width="72" height="72" rx="8" fill="#0D0D0D" stroke="#333333" stroke-width="2"/>
  <rect x="4" y="4" width="72" height="72" rx="8" fill="url(#pDots)"/>
  <!-- Active green border -->
  <rect x="4" y="4" width="72" height="72" rx="8" fill="none" stroke="#FFB800" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Pause bars - LCD segments -->
  <rect x="27" y="22" width="8" height="36" rx="1" fill="#FFB800" filter="url(#lcdPauseGlow)"/>
  <rect x="45" y="22" width="8" height="36" rx="1" fill="#FFB800" filter="url(#lcdPauseGlow)"/>
</svg>
