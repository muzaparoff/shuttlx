<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="meshFallback" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.8"/>
      <stop offset="25%" stop-color="#c7d2fe" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="meshBlob1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshBlob2" cx="80%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshBlob3" cx="50%" cy="85%" r="30%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base gradient -->
  <rect width="390" height="844" fill="url(#meshFallback)"/>
  <!-- Soft blobs simulating mesh gradient -->
  <rect width="390" height="844" fill="url(#meshBlob1)"/>
  <rect width="390" height="844" fill="url(#meshBlob2)"/>
  <rect width="390" height="844" fill="url(#meshBlob3)"/>
  <!-- Subtle noise texture -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="soft-light"/>
  </filter>
  <rect width="390" height="844" fill="white" fill-opacity="0.02" filter="url(#noise)"/>
</svg>
