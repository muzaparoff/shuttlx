<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="pauseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pauseHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="pauseShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.3"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="40" cy="40" r="34" fill="url(#pauseGrad)" filter="url(#pauseShadow)"/>
  <circle cx="40" cy="40" r="34" fill="url(#pauseHighlight)"/>
  <!-- Pause bars -->
  <rect x="30" y="26" width="6" height="28" rx="2" fill="black" fill-opacity="0.85"/>
  <rect x="44" y="26" width="6" height="28" rx="2" fill="black" fill-opacity="0.85"/>
</svg>
