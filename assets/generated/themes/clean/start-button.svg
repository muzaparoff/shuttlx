<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" width="240" height="72">
  <defs>
    <linearGradient id="btnGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="btnHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="btnShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="3"/>
      <feFlood flood-color="#10b981" flood-opacity="0.3"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Button body -->
  <rect x="8" y="8" width="224" height="52" rx="26" ry="26" fill="url(#btnGradient)" filter="url(#btnShadow)"/>
  <!-- Glass highlight overlay -->
  <rect x="8" y="8" width="224" height="26" rx="26" ry="26" fill="url(#btnHighlight)"/>
  <!-- Play triangle icon -->
  <polygon points="92,26 92,46 108,36" fill="white" fill-opacity="0.9"/>
  <!-- START text -->
  <text x="142" y="41" font-family="-apple-system, SF Pro Rounded, Helvetica Neue, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2">START</text>
</svg>
