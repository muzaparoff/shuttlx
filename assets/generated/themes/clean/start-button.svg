<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="btnGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="btnHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="btnShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2"/>
      <feFlood flood-color="#10b981" flood-opacity="0.3"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Button body -->
  <rect x="6" y="6" width="68" height="68" rx="12" fill="url(#btnGradient)" filter="url(#btnShadow)"/>
  <!-- Glass highlight overlay -->
  <rect x="6" y="6" width="68" height="34" rx="12" fill="url(#btnHighlight)"/>
  <!-- Play triangle icon -->
  <polygon points="32,24 32,56 56,40" fill="white" fill-opacity="0.9"/>
</svg>
