<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="glassRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Outer soft glow -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Main glass ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#glassRing)" stroke-width="14" filter="url(#glassShadow)" stroke-linecap="round"/>
  <!-- Inner highlight -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#innerGlow)" stroke-width="6" stroke-opacity="0.5"/>
  <!-- Top specular highlight -->
  <path d="M 45 60 A 72 72 0 0 1 155 60" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- Subtle tick marks at 12, 3, 6, 9 -->
  <line x1="100" y1="24" x2="100" y2="32" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="176" y1="100" x2="168" y2="100" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="100" y1="176" x2="100" y2="168" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="24" y1="100" x2="32" y2="100" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
</svg>
