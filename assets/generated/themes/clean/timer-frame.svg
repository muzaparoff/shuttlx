<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="glassRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="specularTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="specClip">
      <rect x="24" y="10" width="152" height="44" rx="22"/>
    </clipPath>
  </defs>
  <!-- Outer soft glow border -->
  <rect x="6" y="6" width="188" height="188" rx="28" ry="28" fill="none" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Main glass frame -->
  <rect x="14" y="14" width="172" height="172" rx="24" ry="24" fill="none" stroke="url(#glassRing)" stroke-width="14" filter="url(#glassShadow)" stroke-linejoin="round"/>
  <!-- Inner highlight frame -->
  <rect x="14" y="14" width="172" height="172" rx="24" ry="24" fill="none" stroke="url(#innerGlow)" stroke-width="6" stroke-opacity="0.5"/>
  <!-- Top specular highlight -->
  <rect x="34" y="16" width="132" height="3" rx="1.5" fill="url(#specularTop)" clip-path="url(#specClip)"/>
  <!-- Tick marks at 12, 3, 6, 9 -->
  <line x1="100" y1="20" x2="100" y2="28" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="180" y1="100" x2="172" y2="100" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="100" y1="180" x2="100" y2="172" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="20" y1="100" x2="28" y2="100" stroke="white" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
</svg>
