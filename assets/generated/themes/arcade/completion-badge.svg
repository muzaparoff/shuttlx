<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <pattern id="crtLines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000000" stroke-width="1" stroke-opacity="0.2"/>
    </pattern>
    <filter id="pixelGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- CRT background -->
  <rect width="200" height="120" rx="4" fill="#0F0F2D"/>
  <!-- Scanlines -->
  <rect width="200" height="120" rx="4" fill="url(#crtLines)"/>
  <!-- Pixel border -->
  <rect x="2" y="2" width="196" height="116" rx="2" fill="none" stroke="#00FF00" stroke-width="2" stroke-opacity="0.5"/>
  <!-- "HIGH SCORE" pixel text -->
  <g filter="url(#pixelGlow)">
    <!-- H -->
    <rect x="20" y="16" width="3" height="16" fill="#FFAA00"/>
    <rect x="20" y="22" width="10" height="3" fill="#FFAA00"/>
    <rect x="27" y="16" width="3" height="16" fill="#FFAA00"/>
    <!-- I -->
    <rect x="34" y="16" width="3" height="16" fill="#FFAA00"/>
    <!-- G -->
    <rect x="41" y="16" width="10" height="3" fill="#FFAA00"/>
    <rect x="41" y="16" width="3" height="16" fill="#FFAA00"/>
    <rect x="41" y="29" width="10" height="3" fill="#FFAA00"/>
    <rect x="48" y="22" width="3" height="10" fill="#FFAA00"/>
    <rect x="46" y="22" width="5" height="3" fill="#FFAA00"/>
    <!-- H -->
    <rect x="55" y="16" width="3" height="16" fill="#FFAA00"/>
    <rect x="55" y="22" width="10" height="3" fill="#FFAA00"/>
    <rect x="62" y="16" width="3" height="16" fill="#FFAA00"/>
    <!-- S -->
    <rect x="78" y="16" width="10" height="3" fill="#00FF00"/>
    <rect x="78" y="16" width="3" height="9" fill="#00FF00"/>
    <rect x="78" y="22" width="10" height="3" fill="#00FF00"/>
    <rect x="85" y="22" width="3" height="10" fill="#00FF00"/>
    <rect x="78" y="29" width="10" height="3" fill="#00FF00"/>
    <!-- C -->
    <rect x="92" y="16" width="10" height="3" fill="#00FF00"/>
    <rect x="92" y="16" width="3" height="16" fill="#00FF00"/>
    <rect x="92" y="29" width="10" height="3" fill="#00FF00"/>
    <!-- O -->
    <rect x="106" y="16" width="10" height="3" fill="#00FF00"/>
    <rect x="106" y="16" width="3" height="16" fill="#00FF00"/>
    <rect x="113" y="16" width="3" height="16" fill="#00FF00"/>
    <rect x="106" y="29" width="10" height="3" fill="#00FF00"/>
    <!-- R -->
    <rect x="120" y="16" width="3" height="16" fill="#00FF00"/>
    <rect x="120" y="16" width="10" height="3" fill="#00FF00"/>
    <rect x="127" y="16" width="3" height="9" fill="#00FF00"/>
    <rect x="120" y="22" width="10" height="3" fill="#00FF00"/>
    <rect x="125" y="25" width="3" height="7" fill="#00FF00"/>
    <!-- E -->
    <rect x="134" y="16" width="3" height="16" fill="#00FF00"/>
    <rect x="134" y="16" width="10" height="3" fill="#00FF00"/>
    <rect x="134" y="22" width="8" height="3" fill="#00FF00"/>
    <rect x="134" y="29" width="10" height="3" fill="#00FF00"/>
    <!-- ! -->
    <rect x="148" y="16" width="3" height="12" fill="#FF0000"/>
    <rect x="148" y="30" width="3" height="3" fill="#FF0000"/>
  </g>
  <!-- Star decoration row -->
  <g fill="#FFFF00" filter="url(#pixelGlow)">
    <polygon points="30,55 33,48 36,55 30,50 36,50" fill="#FFFF00"/>
    <polygon points="60,55 63,48 66,55 60,50 66,50" fill="#00FFFF"/>
    <polygon points="90,55 93,48 96,55 90,50 96,50" fill="#FF00FF"/>
    <polygon points="120,55 123,48 126,55 120,50 126,50" fill="#FFFF00"/>
    <polygon points="150,55 153,48 156,55 150,50 156,50" fill="#00FFFF"/>
    <polygon points="170,55 173,48 176,55 170,50 176,50" fill="#FF00FF"/>
  </g>
  <!-- Score display -->
  <text x="100" y="82" font-family="'SF Mono', 'Menlo', monospace" font-size="22" font-weight="900" fill="#00FF00" text-anchor="middle" letter-spacing="3" filter="url(#pixelGlow)">999,999</text>
  <!-- Insert coin text -->
  <text x="100" y="105" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#FFAA00" text-anchor="middle" letter-spacing="2" opacity="0.6">WORKOUT COMPLETE</text>
</svg>
