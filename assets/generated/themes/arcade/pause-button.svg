<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <pattern id="apScan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-width="1" stroke-opacity="0.15"/>
    </pattern>
    <filter id="arcPauseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Chunky pixel circle -->
  <rect x="4" y="4" width="72" height="72" rx="4" fill="#1A1A3E"/>
  <rect x="4" y="4" width="72" height="72" rx="4" fill="url(#apScan)"/>
  <!-- Pixel border -->
  <rect x="4" y="4" width="72" height="72" rx="4" fill="none" stroke="#FFFF00" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Corner pixels -->
  <rect x="4" y="4" width="6" height="3" fill="#FFAA00"/><rect x="4" y="4" width="3" height="6" fill="#FFAA00"/>
  <rect x="70" y="4" width="6" height="3" fill="#FFAA00"/><rect x="73" y="4" width="3" height="6" fill="#FFAA00"/>
  <rect x="4" y="73" width="6" height="3" fill="#FFAA00"/><rect x="4" y="70" width="3" height="6" fill="#FFAA00"/>
  <rect x="70" y="73" width="6" height="3" fill="#FFAA00"/><rect x="73" y="70" width="3" height="6" fill="#FFAA00"/>
  <!-- Pixel pause bars -->
  <rect x="26" y="22" width="8" height="36" fill="#FFFF00" filter="url(#arcPauseGlow)"/>
  <rect x="46" y="22" width="8" height="36" fill="#FFFF00" filter="url(#arcPauseGlow)"/>
</svg>
