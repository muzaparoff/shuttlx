<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <pattern id="btnScanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000000" stroke-width="0.8" stroke-opacity="0.2"/>
    </pattern>
    <filter id="btnPixelGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Button body - chunky pixel style -->
  <rect x="4" y="4" width="72" height="72" rx="4" fill="#0F0F2D"/>
  <!-- Scanlines -->
  <rect x="4" y="4" width="72" height="72" rx="4" fill="url(#btnScanlines)"/>
  <!-- Pixel border - double line -->
  <rect x="4" y="4" width="72" height="72" rx="4" fill="none" stroke="#00FF00" stroke-width="3" stroke-opacity="0.7"/>
  <rect x="10" y="10" width="60" height="60" rx="2" fill="none" stroke="#00FF00" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Pixel corner accents -->
  <rect x="4" y="4" width="8" height="3" fill="#FFAA00"/>
  <rect x="4" y="4" width="3" height="8" fill="#FFAA00"/>
  <rect x="68" y="4" width="8" height="3" fill="#FFAA00"/>
  <rect x="73" y="4" width="3" height="8" fill="#FFAA00"/>
  <rect x="4" y="73" width="8" height="3" fill="#FFAA00"/>
  <rect x="4" y="68" width="3" height="8" fill="#FFAA00"/>
  <rect x="68" y="73" width="8" height="3" fill="#FFAA00"/>
  <rect x="73" y="68" width="3" height="8" fill="#FFAA00"/>
  <!-- Play triangle - pixel style -->
  <g filter="url(#btnPixelGlow)">
    <rect x="30" y="24" width="4" height="32" fill="#00FF00"/>
    <rect x="34" y="28" width="4" height="24" fill="#00FF00"/>
    <rect x="38" y="32" width="4" height="16" fill="#00FF00"/>
    <rect x="42" y="36" width="4" height="8" fill="#00FF00"/>
  </g>
</svg>
