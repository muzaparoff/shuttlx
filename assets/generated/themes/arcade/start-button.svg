<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" width="240" height="72">
  <defs>
    <pattern id="btnScanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000000" stroke-width="0.8" stroke-opacity="0.2"/>
    </pattern>
    <filter id="btnPixelGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Button body - chunky pixel style -->
  <rect x="4" y="4" width="232" height="64" rx="4" fill="#0F0F2D"/>
  <!-- Scanlines -->
  <rect x="4" y="4" width="232" height="64" rx="4" fill="url(#btnScanlines)"/>
  <!-- Pixel border - double line -->
  <rect x="4" y="4" width="232" height="64" rx="4" fill="none" stroke="#00FF00" stroke-width="3" stroke-opacity="0.7"/>
  <rect x="10" y="10" width="220" height="52" rx="2" fill="none" stroke="#00FF00" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Pixel corner accents -->
  <rect x="4" y="4" width="8" height="3" fill="#FFAA00"/>
  <rect x="4" y="4" width="3" height="8" fill="#FFAA00"/>
  <rect x="228" y="4" width="8" height="3" fill="#FFAA00"/>
  <rect x="233" y="4" width="3" height="8" fill="#FFAA00"/>
  <rect x="4" y="65" width="8" height="3" fill="#FFAA00"/>
  <rect x="4" y="60" width="3" height="8" fill="#FFAA00"/>
  <rect x="228" y="65" width="8" height="3" fill="#FFAA00"/>
  <rect x="233" y="60" width="3" height="8" fill="#FFAA00"/>
  <!-- Play triangle - pixel style -->
  <g filter="url(#btnPixelGlow)">
    <rect x="82" y="24" width="4" height="24" fill="#00FF00"/>
    <rect x="86" y="28" width="4" height="16" fill="#00FF00"/>
    <rect x="90" y="32" width="4" height="8" fill="#00FF00"/>
  </g>
  <!-- START text - heavy pixel -->
  <text x="155" y="43" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="20" font-weight="900" fill="#00FF00" text-anchor="middle" letter-spacing="5" filter="url(#btnPixelGlow)">START</text>
  <!-- Coin slot indicator -->
  <text x="155" y="56" font-family="'SF Mono', monospace" font-size="7" fill="#FFAA00" text-anchor="middle" letter-spacing="1" opacity="0.5">INSERT COIN</text>
</svg>
